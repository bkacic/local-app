const PLAYBOOK_DIGEST = (() => {
  const sec = (arr) => arr.map((s) => {
    const lines = s.blocks.flatMap((b) =>
      b.items ? b.items : b.do ? [...b.do, ...b.dont] : b.text ? [b.text] : []
    );
    return `${s.title}: ${lines.slice(0, 8).join("; ")}`;
  }).join("\n");
  return `FOUNDATION\n${sec(FOUNDATION)}\n\nPLAYBOOK\n${sec(PLAYBOOK)}`;
})();

  ],

const daySeed = () => Math.floor(Date.now() / 86400000);
function pickDaily(pool, ctx, phase, salt) {
  let f = pool.filter((i) => i.ctx === "both" || i.ctx === ctx);
  if (phase) {
    const byPhase = f.filter((i) => i.phases.includes(phase));
    if (byPhase.length) f = byPhase;
  }
  if (!f.length) return "";
  const idx = (daySeed() * 7 + salt) % f.length;
  return f[idx].t;
}

/* ----------------------------------------------------------------------------
   Persistent storage helpers (graceful — never crashes if unavailable)
---------------------------------------------------------------------------- */
async function sGet(key) {
  try { const r = localStorage.getItem(key); return r == null ? null : JSON.parse(r); }
  catch { return null; }
}
async function sSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function Line({ text, saved, onCopy, onSave }) {
  const [copied, setCopied] = useState(false);
  const handle = () => {
    try { navigator.clipboard && navigator.clipboard.writeText(text); } catch {}
    setCopied(true); onCopy && onCopy();
    setTimeout(() => setCopied(false), 1100);
  };
  return (
    <div className={`line ${copied ? "line--copied" : ""}`} onClick={handle}>
      <span className="line__txt">{text}</span>
      <span className="line__actions">
        {copied ? <Check size={15} /> : <Copy size={14} className="line__copy" />}

const CHIPS = [
  { label: "Compliment for " + HER, prompt: `Give me 3 specific, non-generic compliments I could say to ${HER} today. Keep them natural and in my voice.` },
  { label: "Date idea", prompt: `Suggest 3 date ideas for me and ${HER} — mix of effort levels, a couple doable this week. We're in the Detroit metro area.` },
  { label: "What do I say when…", prompt: `Coach me: ${HER} comes home stressed and venting. What do I actually say in the first 60 seconds?` },
  { label: "Conversation starter", prompt: `Give me 3 good questions to ask ${HER} tonight that go deeper than small talk.` },
  { label: "I'm restless", prompt: `My ADHD brain is restless and wants novelty / to scroll. Redirect me into something connecting I can do with ${HER} right now.` },
  { label: "Plan tonight", prompt: `Help me lead a small, low-effort but intentional plan for ${HER} and me tonight.` },
];

const COACH_SYSTEM = `You are a warm, sharp relationship coach speaking privately to Brendan, who is intentionally working to be a more present, playful, and steady partner to his girlfriend ${HER}. He has ADHD and is consciously rewiring his attention toward connection rather than novelty.

Ground every answer in his own playbook below. Match his voice: confident, natural, a little playful — never cheesy, scripted, or performative. Be concrete and immediately usable. Default to short answers (a few options or a tight paragraph). When he asks for lines to say, make them sound like a real person, not a greeting card. Never be preachy. If something needs nuance (e.g. her cycle, a conflict), remind him gently that her real signals matter more than any rule.

HIS PLAYBOOK:
${PLAYBOOK_DIGEST}`;

function Coach({ seed, clearSeed, together, phase }) {
  const [msgs, setMsgs] = useState([
    { role: "assistant", content: `Hey — I've got your whole playbook loaded. Ask me for a compliment, a date idea, what to say in a moment, a question for ${HER}, or just tell me what's going on. What do you need?` },
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  const send = useCallback(async (text) => {
    const content = (text ?? input).trim();
    if (!content || loading) return;
    setInput("");
    const history = [...msgs, { role: "user", content }];
    setMsgs(history);
    setLoading(true);
    const ctxLine =
      `\n\nTODAY'S CONTEXT (private — never name her cycle to her): ` +
      (together
        ? "They are together in person today, so in-person ideas are fair game."
        : "They are apart today — favor remote moves (text, voice memo, a delivered treat, a question to text her); avoid in-person touch suggestions.") +
      (phase
        ? ` Her phase is ${phase} — 1 period (lead with comfort, calm, low pressure), 2 follicular (playful, energetic, open to novelty), 3 ovulation (flirty, romantic, build connection), 4 luteal (extra patience, validate first, keep things calm). Bias the tone, but her real signals always win.`
        : "");
    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: COACH_SYSTEM + ctxLine,
          messages: history.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const reply = (data.content || [])
        .filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();
      setMsgs((m) => [...m, { role: "assistant", content: reply || "Hmm, I blanked there — try asking again?" }]);
    } catch (e) {
      setMsgs((m) => [...m, { role: "assistant", content: "Couldn't reach me just now — give it another shot in a sec." }]);
    } finally {
      setLoading(false);
    }
  }, [input, loading, msgs, together, phase]);

  useEffect(() => {
    if (seed) { send(seed); clearSeed(); }
    // eslint-disable-next-line
  }, [seed]);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);

  return (
    <div className="coach">
      <div className="coach__stream">
        {msgs.map((m, i) => (
          <div key={i} className={`bubble bubble--${m.role}`}>
            {m.content.split("\n").map((l, j) => <p key={j}>{l || "\u00A0"}</p>)}
          </div>
        ))}
        {loading && (
          <div className="bubble bubble--assistant bubble--load">
            <Loader2 size={16} className="spin" /> thinking…
          </div>
        )}
        <div ref={endRef} />
      </div>

      <div className="chips">
        {CHIPS.map((c) => (
          <button key={c.label} className="chip" disabled={loading}
            onClick={() => send(c.prompt)}>{c.label}</button>
        ))}
      </div>

      <div className="composer">
        <input
          value={input}
          placeholder="Ask your coach anything…"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && send()}
        />
        <button onClick={() => send()} disabled={loading || !input.trim()} aria-label="send">
          <Send size={18} />
        </button>
      </div>
    </div>
  );
}

            </div>
            {FOUNDATION.map((s) => (
              <Section key={s.id} s={s} open={!!openIds[s.id]}
                onToggle={() => toggleOpen(s.id)} savedSet={savedSet} toggleSave={toggleSave}
                phase={phase} setPhase={setPhase} />
            ))}
          </div>
        )}
        {tab === "playbook" && (
          <div className="tab">
            <div className="tab__lead">
              <h2>In Action</h2>
              <p>What to actually do and say. Tap any line to copy it, tap the ☆ to save it to your Today tab.</p>
            </div>
            <MyIdeas notes={notes} onAdd={addNote} onDelete={deleteNote} />
            {PLAYBOOK.map((s) => (
              <Section key={s.id} s={s} open={!!openIds[s.id]}
                onToggle={() => toggleOpen(s.id)} savedSet={savedSet} toggleSave={toggleSave} />
            ))}
          </div>
        )}
        {tab === "coach" && <Coach seed={seed} clearSeed={() => setSeed(null)} together={together} phase={phase} />}
      </main>

      <nav className="tabbar">
        {TABS.map((t) => {
          const I = t.icon;
          return (
            <button key={t.id} className={`tabbar__btn ${tab === t.id ? "is-active" : ""}`}
              onClick={() => setTab(t.id)}>
              <I size={20} />
              <span>{t.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

}
